version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    pull-request-branch-name:
      separator: "/"
    reviewers:
      - "vnykmshr"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci"
    open-pull-requests-limit: 5
    versioning-strategy: "auto"
    commit-message:
      prefix: "ci(actions):"
      include: "scope"
